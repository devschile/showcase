<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">

<head>
  {{ partial "head.html" . }}
</head>

<body class="{{ block " bodyClass" . }}bg-background text-gray-100 font-sans min-h-screen bg-gradient-mesh{{ end }}">
  {{ if ne .Kind "404" }}
  {{ partial "header.html" . }}
  {{ end }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ if ne .Kind "404" }}
  {{ partial "footer.html" . }}
  {{ end }}
</body>

</html>
