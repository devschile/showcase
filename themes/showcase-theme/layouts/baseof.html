<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">

<head>
  {{ partial "head.html" . }}
</head>

<body class="{{ block " bodyClass" . }}bg-background text-gray-100 font-sans min-h-screen bg-gradient-mesh{{ end }}">
  <header class="sticky top-0 z-50 glass-card border-b border-white/10" data-purpose="navigation-header">
    {{ partial "header.html" . }}
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    {{ partial "footer.html" . }}
  </footer>
</body>

</html>
